{# Load More control. On append responses it is swapped out-of-band so the
   button updates itself (next page / disappears) after cards are appended. #}
<div id="load-more" {% if oob %}hx-swap-oob="true"{% endif %} class="mt-6 text-center">
  {% if page_data and page_data.has_more %}
  <button
    class="rounded-md bg-slate-700 hover:bg-slate-600 px-5 py-2 font-medium"
    hx-get="/movies?list={{ list_id }}&page={{ page_data.page + 1 }}"
    hx-target="#movie-cards"
    hx-swap="beforeend"
  >
    Load More
  </button>
  {% endif %}
</div>
