{# Desktop tab toolbar and genre controls. Mobile drawer lives in base.html. #}
{# Alpine state lives on <body> in base.html. #}
<nav
  class="hidden md:flex flex-wrap items-center gap-2 mb-6"
>
  {% for id, label in lists %}
  <button
    @click="activeTab = '{{ id }}'; activeGenre = ''; sortByRating = false"
    :class="activeGenre === '' && activeTab === '{{ id }}'
      ? 'bg-slate-100 text-slate-900'
      : 'bg-slate-800 text-slate-300 hover:bg-slate-700'"
    class="rounded-md px-3 py-1.5 text-sm font-medium transition-colors"
    hx-get="/movies?list={{ id }}"
    hx-target="#movie-list"
    hx-swap="innerHTML"
  >
    {{ label }}
  </button>
  {% endfor %}

  {% if genres %}
  <div class="ml-auto flex items-center gap-3"
       hx-get="/movies"
       hx-target="#movie-list"
       hx-swap="innerHTML"
       hx-trigger="change from:#genre-select, change from:#sort-checkbox"
       hx-include="#genre-select, #sort-checkbox">
    <select id="genre-select"
      name="genre_id"
      x-model="activeGenre"
      @change="activeTab = ''"
      class="rounded-md bg-slate-800 border border-slate-700 px-3 py-1.5 text-sm text-slate-200 focus:border-slate-500 focus:outline-none"
    >
      <option value="">All Genres</option>
      {% for genre in genres %}
      <option value="{{ genre.id }}">{{ genre.name }}</option>
      {% endfor %}
    </select>
    <label class="flex items-center gap-1.5 text-sm text-slate-400 cursor-pointer select-none whitespace-nowrap"
           :class="activeGenre ? 'text-slate-300' : 'text-slate-600'">
      <input id="sort-checkbox"
        type="checkbox"
        name="sort_by_rating"
        value="true"
        x-model="sortByRating"
        class="rounded border-slate-600 bg-slate-800 text-amber-400 focus:ring-0 focus:ring-offset-0"
        :disabled="!activeGenre"
      >
      By rating
    </label>
  </div>
  {% endif %}
</nav>
