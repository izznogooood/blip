<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}{{ app_name }}{% endblock %}</title>

  <!-- Tailwind CSS (CDN, v1 — no build pipeline) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- HTMX -->
  <script src="https://unpkg.com/htmx.org@2.0.3" defer></script>
  <!-- Alpine.js -->
  <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>

  <link rel="stylesheet" href="{{ url_for('static', path='app.css') }}" />
</head>

<body class="min-h-screen bg-slate-900 text-slate-100">
  <header class="border-b border-slate-800">
    <div class="mx-auto max-w-6xl px-4 py-4 flex items-center justify-between">
      <a href="/" class="flex items-center gap-1.5">
        <span class="text-2xl font-bold tracking-tight">{{ app_name }}</span>
      </a>
      <a href="https://www.themoviedb.org/" target="_blank" rel="noopener noreferrer" class="flex items-center gap-1.5">
        <span class="text-xs text-slate-400">Powered by</span>
        <img src="{{ url_for('static', path='blue_square.svg') }}" alt="Blip" class="h-3 w-auto" />
      </a>
      <a href="/settings"
        class="rounded-md bg-slate-800 px-3 py-1.5 text-sm font-medium text-slate-300 hover:bg-slate-700">
        Settings
      </a>
    </div>
  </header>

  <main class="mx-auto max-w-6xl px-4 py-8">
    {% block content %}{% endblock %}
  </main>

  <script src="{{ url_for('static', path='app.js') }}"></script>
</body>

</html>
